# =============================================================================
# pnpm.yaml — configurações do pnpm para este projeto
#
# No pnpm 10, as configurações que antes ficavam no campo "pnpm" do
# package.json foram movidas para este arquivo separado.
#
# OVERRIDES: força versões específicas de dependências transitivas
# (pacotes que não estão no seu package.json mas são puxados por outros).
#
# Por que precisamos disso?
# O pnpm 10 rejeita pacotes publicados há menos de 24h (proteção contra
# supply-chain attacks). Fixamos aqui as últimas versões estáveis
# conhecidas para evitar que resoluções futuras puxem versões recém-
# publicadas que ainda não "envelheceram".
# =============================================================================

overrides:
  # tldts e tldts-core são dependências do jsdom (usado pelo Vitest).
  # 7.0.28 é a versão "latest" estável no registro — bem anterior às
  # 7.3.x/7.4.x que são pre-releases publicadas recentemente.
  tldts: 7.0.28
  tldts-core: 7.0.28

  # @babel/runtime é dependência transitiva de vários pacotes de teste.
  # 7.27.6 é uma versão estável com semanas de existência.
  "@babel/runtime": 7.27.6
