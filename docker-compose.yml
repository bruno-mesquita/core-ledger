version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: coreledger
      POSTGRES_USER: coreledger
      POSTGRES_PASSWORD: coreledger_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=coreledger;Username=coreledger;Password=coreledger_dev"
      Jwt__SecretKey: "change-me-in-production-min-32-chars-coreledger!!"
      Jwt__Issuer: "coreledger"
      Jwt__Audience: "coreledger-clients"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
